  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button class="lightbox-close" id="lb-close" aria-label="Close">&times;</button>
    <button class="lightbox-prev" id="lb-prev" aria-label="Previous">&#8249;</button>
    <img id="lb-img" src="" alt="" />
    <button class="lightbox-next" id="lb-next" aria-label="Next">&#8250;</button>
  </div>

  <script src="nav.js"></script>
  <script>
    // Lightbox
    const gallery = document.getElementById('gallery');
    const imgs = Array.from(gallery.querySelectorAll('img'));
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    let current = 0;

    function openLightbox(idx) {
      current = idx;
      lbImg.src = imgs[idx].src;
      lbImg.alt = imgs[idx].alt;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    imgs.forEach((img, i) => img.addEventListener('click', () => openLightbox(i)));

    document.getElementById('lb-close').addEventListener('click', closeLightbox);

    document.getElementById('lb-prev').addEventListener('click', () => {
      current = (current - 1 + imgs.length) % imgs.length;
      lbImg.src = imgs[current].src;
      lbImg.alt = imgs[current].alt;
    });

    document.getElementById('lb-next').addEventListener('click', () => {
      current = (current + 1) % imgs.length;
      lbImg.src = imgs[current].src;
      lbImg.alt = imgs[current].alt;
    });

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') document.getElementById('lb-prev').click();
      if (e.key === 'ArrowRight') document.getElementById('lb-next').click();
    });
  </script>
